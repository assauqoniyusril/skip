server {
    listen 80;
    server_name skpi.dwijacode.my.id;

    # Root harus mengarah ke folder public di dalam subfolder skpi
    root /var/www/html/public;
    index index.php index.html;

    charset utf-8;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Hilangkan favicon dan robots.log dari log untuk kebersihan
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        # 'skpi' adalah nama service di docker-compose
        fastcgi_pass skpi:9000;
        fastcgi_index index.php;
        
        # SCRIPT_FILENAME sangat krusial untuk koneksi Nginx-PHP
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        
        fastcgi_hide_header X-Powered-By; # Opsional: Keamanan
    }

    location ~ /\.(node|ht|git) {
        deny all;
    }
}