services:
  # LAPIS 2 - PROXY (NGINX)
  nginx:
    image: nginx:alpine
    container_name: skpi_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./src:/var/www/html:rw
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - skpi
    networks:
      - laravel
    restart: unless-stopped

  # LAPIS 3 - ENGINE (PHP-FPM)
  skpi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: skpi_php
    working_dir: /var/www/html/skpi
    volumes:
      - ./src:/var/www/html:rw
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://skpi.dwijacode.my.id
      - APP_TIMEZONE=Asia/Jakarta
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=absen
      - DB_USERNAME=absenadmin
      - DB_PASSWORD=sPc@1234
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
    depends_on:
      - db
      - redis
    networks:
      - laravel
    restart: unless-stopped

  # LAPIS 4 - DATA (MySQL)
  db:
    image: mysql:8.0
    container_name: skpi_mysql
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      MYSQL_DATABASE: absen
      MYSQL_USER: absenadmin
      MYSQL_PASSWORD: sPc@1234
      MYSQL_ROOT_PASSWORD: rootsPc@1234
    volumes:
      - ./mysql:/var/lib/mysql
      - ./backups:/backups
    networks:
      - laravel
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  # LAPIS 4 - CACHE (Redis)
  redis:
    image: redis:alpine
    container_name: skpi_redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - ./redis:/data
    networks:
      - laravel
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ""

networks:
  laravel:
    driver: bridge

volumes:
  db_data:
  redis_data: