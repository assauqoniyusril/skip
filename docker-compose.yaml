services:
  # LAPIS 2 - PROXY (NGINX)
  nginx:
    image: nginx:alpine
    container_name: skpi_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./src:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - skpi
    networks:
      - laravel
    restart: unless-stopped

  # LAPIS 3 - ENGINE (PHP-FPM)
  skpi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: skpi_php
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=https://absen.dwijacode.my.id
      - APP_FORCE_URL=https://absen.dwijacode.my.id
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=absen
      - DB_USERNAME=absenadmin
      - DB_PASSWORD=sPc@1234
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SESSION_SECURE_COOKIE=true
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - laravel
    restart: unless-stopped

  # LAPIS 4 - DATA (MySQL)
  db:
    image: mysql:8.0
    container_name: skpi_mysql
    # Port mapping dihapus - tidak perlu akses dari host
    environment:
      MYSQL_DATABASE: absen
      MYSQL_USER: absenadmin
      MYSQL_PASSWORD: sPc@1234
      MYSQL_ROOT_PASSWORD: rootsPc@1234
    volumes:
      - ./mysql:/var/lib/mysql
    networks:
      - laravel
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s
      start_period: 30s

  # LAPIS 4 - CACHE (Redis)
  redis:
    image: redis:alpine
    container_name: skpi_redis
    # Port mapping dihapus - tidak perlu akses dari host
    command: redis-server --appendonly yes --requirepass sPc@1234
    volumes:
      - ./redis:/data
    networks:
      - laravel
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  laravel:
    driver: bridge
